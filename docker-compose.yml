services:
  server:
    image: ghcr.io/willianjc/tacnamarket-server:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${NEST_PORT:-3001}:${NEST_PORT:-3001}"
    env_file:
      - .env
    restart: unless-stopped

  client:
    image: ghcr.io/willianjc/tacnamarket-client:latest
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_PORT:-5173}:80"
    depends_on:
      - server
    restart: unless-stopped
