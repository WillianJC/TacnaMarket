name: Validate & Deploy
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install server & client dependencies
        run: bun run install-all

      - name: Build server & client
        run: bun run build-all

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Server Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.value }}/tacnamarket-server:latest

      # --- CAMBIO 2: GENERAR IMAGEN DEL CLIENTE (NUEVO) ---
      - name: Build and push Client Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.value }}/tacnamarket-client:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      packages: read
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,REGISTRY_USER,IMAGE_OWNER
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$REGISTRY_USER" --password-stdin
            
            cd ~/projects/TacnaMarket
            git pull origin main
            
            # --- CAMBIO 3: DESCARGAR AMBAS IMÁGENES (NUEVO) ---
            IMAGE_PATH_LOWER=$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
            docker pull ghcr.io/$IMAGE_PATH_LOWER/tacnamarket-server:latest
            docker pull ghcr.io/$IMAGE_PATH_LOWER/tacnamarket-client:latest
            
            # Levantar todo (Server + Client)
            docker compose up -d
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
          IMAGE_OWNER: ${{ github.repository_owner }}